name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Code Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Set up Node.js (change if using Python/Java)
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 3️⃣ Install Dependencies
    - name: Install dependencies
      run: npm install

    # 4️⃣ Build
    - name: Build application
      run: npm run build --if-present

    # 5️⃣ Unit Testing
    - name: Run tests
      run: npm test

    # 6️⃣ SAST Scan (SonarQube)
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # 7️⃣ Dependency Scanning (npm audit)
    - name: Dependency Scan
      run: npm audit --audit-level=high

    # 8️⃣ Build Docker Image
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sample-app:latest .

    # 9️⃣ Container Scan (Trivy)
    - name: Scan Docker Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/sample-app:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    # 🔟 Login to Docker Hub
    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 1️⃣1️⃣ Push Image
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/sample-app:latest
